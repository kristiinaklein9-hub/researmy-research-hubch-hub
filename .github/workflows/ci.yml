name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - master

jobs:
  test:
    # Windows / macOS runners have 14 GB RAM — run the full suite without
    # sharding. Ubuntu (7 GB) is handled separately in test-ubuntu (see #61).
    name: test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    # v0.95.0 W9 (G5 #17): the gated matrix is 3.10–3.13 (hard — must
    # be green to merge/release). 3.14 is experimental so it RUNS (honest:
    # classifiers claim 3.14, CI exercises it) but does NOT gate.
    continue-on-error: ${{ matrix.experimental || false }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        include:
          - os: windows-latest
            python-version: "3.14"
            experimental: true
          - os: macos-latest
            python-version: "3.14"
            experimental: true

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install dependencies
        run: pip install -e '.[mcp,dev,playwright]'

      - name: Install defuddle CLI
        run: npm install -g defuddle-cli
        continue-on-error: true

      - name: Dependency CVE scan (pip-audit)
        # v0.95.0 W9 (G5 #19): supply-chain scan. Non-blocking for now;
        # promotes to blocking once dependency set is known-clean.
        run: |
          pip install pip-audit
          pip-audit --strict --desc || true
        continue-on-error: true

      - name: Run tests
        run: pytest -q --maxfail=3 -m "not slow"

      - name: Coverage
        # Moved from ubuntu-latest to windows-latest (14 GB RAM, no OOM risk).
        # Ubuntu now runs sharded (test-ubuntu); per-shard coverage would be
        # inaccurate and fail the fail-under threshold. See issue #61.
        if: matrix.python-version == '3.12' && matrix.os == 'windows-latest'
        run: pytest --cov=research_hub --cov-report=term-missing --cov-fail-under=62 -m "not slow"

  test-ubuntu:
    # Issue #61: ubuntu-latest runners have ~7 GB RAM. 2800+ tests with
    # lazy-loaded modules OOM the runner. Split into 4 shards (~700 tests
    # each) to keep peak RSS well under the limit.
    # pytest-split assigns tests to shards deterministically by duration
    # (or alphabetically on first run), so each shard is an independent job.
    name: test (ubuntu-latest, py${{ matrix.python-version }}, shard ${{ matrix.split_index }}/4)
    runs-on: ubuntu-latest
    # v0.95.0 W9 (G5 #17): 3.10–3.13 hard-gate; 3.14 experimental (1 shard).
    continue-on-error: ${{ matrix.experimental || false }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        split_index: [1, 2, 3, 4]
        include:
          # 3.14 is experimental — only shard 1 to limit noise from compat
          # warnings without paying 4× job cost for a non-gated Python.
          - python-version: "3.14"
            split_index: 1
            experimental: true

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install dependencies
        run: pip install -e '.[mcp,dev,playwright]'

      - name: Install defuddle CLI
        run: npm install -g defuddle-cli
        continue-on-error: true

      - name: Dependency CVE scan (pip-audit)
        run: |
          pip install pip-audit
          pip-audit --strict --desc || true
        continue-on-error: true

      - name: Run tests (shard ${{ matrix.split_index }}/4)
        run: pytest -q --maxfail=3 -m "not slow" --splits 4 --group ${{ matrix.split_index }}

  stress-tests:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install dependencies
        run: pip install -e '.[mcp,dev,playwright]'

      - name: Install defuddle CLI
        run: npm install -g defuddle-cli
        continue-on-error: true

      - name: Run stress tests
        # Override pyproject.toml addopts (which excludes 'stress' marker by default)
        # so that the stress suite is actually selected here.
        run: pytest tests/stress/ -v -o "addopts=" -m stress
        timeout-minutes: 10

  skill-version-guard:
    # Phase 8.1 / dogfood V1b lesson: a skill-content change that ships to
    # master without a plugin version bump never reaches user installs —
    # the marketplace plugin cache directory is keyed on the version string
    # in .claude-plugin/plugin.json. This job blocks that class of bug at
    # PR time: if a PR touches skills/ or src/research_hub/skills_data/, it
    # MUST also bump the plugin version.
    name: skill-version-guard
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Skill-content change requires a plugin version bump
        run: |
          base='${{ github.event.pull_request.base.sha }}'
          head='${{ github.event.pull_request.head.sha }}'
          git fetch --no-tags origin "$base" >/dev/null 2>&1 || true
          # Use the true common ancestor, not the base-branch tip — the tip
          # can move after PR creation and produce false positives.
          merge_base=$(git merge-base "$base" "$head")
          changed=$(git diff --name-only "$merge_base" "$head")
          echo "Merge base: $merge_base"
          echo "Changed files in this PR:"
          echo "$changed"
          if echo "$changed" | grep -qE '^(skills|src/research_hub/skills_data)/'; then
            echo "Skill content changed — a plugin version bump is required."
            # Compare the version VALUE before/after — robust to reformatting
            # (a diff-line grep would false-PASS when the line moves unchanged).
            read_ver() {
              git show "$1:.claude-plugin/plugin.json" 2>/dev/null \
                | python3 -c "import sys,json; print(json.load(sys.stdin).get('version',''))" 2>/dev/null \
                || echo ''
            }
            base_ver=$(read_ver "$merge_base")
            head_ver=$(read_ver "$head")
            echo "plugin.json version: base='$base_ver' head='$head_ver'"
            if [ -z "$head_ver" ]; then
              echo "::error::Could not read \"version\" from .claude-plugin/plugin.json on the PR head."
              exit 1
            fi
            if [ "$base_ver" = "$head_ver" ]; then
              echo "::error::This PR changes skill content (skills/ or src/research_hub/skills_data/) but .claude-plugin/plugin.json version is unchanged ('$head_ver'). The marketplace plugin cache is keyed on the version string — an un-bumped change never reaches user installs. Bump the version (see Phase 8.1 / dogfood V1b). Even a non-functional edit needs a bump so the cache invalidates cleanly."
              exit 1
            fi
            echo "OK — skill-content change is paired with a plugin version bump ('$base_ver' -> '$head_ver')."
          else
            echo "No skill-content change in this PR — guard not applicable."
          fi
