name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - master

jobs:
  test:
    runs-on: ${{ matrix.os }}
    # v0.95.0 W9 (G5 #17): the gated matrix is 3.10–3.13 (hard — must
    # be green to merge/release). 3.14 is added per-OS via `include`
    # with experimental:true so it RUNS (honest: classifiers claim
    # 3.14, CI exercises it) but does NOT gate (pydantic-v1/3.14 has
    # known compat warnings; a 3.14-only red must not wedge every
    # release). README marks 3.14 experimental. Promote to the hard
    # matrix once the pydantic-v1 path is resolved.
    continue-on-error: ${{ matrix.experimental || false }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        include:
          - os: ubuntu-latest
            python-version: "3.14"
            experimental: true
          - os: windows-latest
            python-version: "3.14"
            experimental: true
          - os: macos-latest
            python-version: "3.14"
            experimental: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: pip install -e '.[mcp,dev,playwright]'

      - name: Install defuddle CLI
        run: npm install -g defuddle-cli
        continue-on-error: true

      - name: Dependency CVE scan (pip-audit)
        # v0.95.0 W9 (G5 #19): supply-chain scan. Non-blocking for now
        # (continue-on-error) so a transitive-dep CVE doesn't wedge the
        # whole matrix overnight; surfaces in the job summary. Promote to
        # blocking once the dependency set is known-clean.
        run: |
          pip install pip-audit
          pip-audit --strict --desc || true
        continue-on-error: true

      - name: Run tests
        run: pytest -q --maxfail=3 -m "not slow"

      - name: Coverage
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        # v0.67: ratcheted from 60 -> 62. Targeted unit-test uplift in
        # v0.65 (upload 7->54%, bundle 27->84%, setup 21->59%) plus v0.66
        # schema/docs tests pushed real coverage above 62%; lock it in.
        run: pytest --cov=research_hub --cov-report=term-missing --cov-fail-under=62 -m "not slow"

  stress-tests:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: pip install -e '.[mcp,dev,playwright]'

      - name: Install defuddle CLI
        run: npm install -g defuddle-cli
        continue-on-error: true

      - name: Run stress tests
        run: pytest tests/stress/ -v
        timeout-minutes: 10
