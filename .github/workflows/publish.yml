name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install build twine

      - name: Build
        run: python -m build

      - name: Check
        run: twine check dist/*

      # v0.65: validate the wheel actually installs + imports in a fresh
      # venv before uploading. Catches packaging bugs (missing module in
      # wheel, broken __version__, syntax error introduced post-CI) that
      # the test matrix can't see because tests run on the editable repo.
      # v0.68.3: also assert __version__ matches the git tag (drop the
      # leading 'v'). The drift check `tests/test_v068_3_version_sync.py`
      # catches mismatches between pyproject.toml and __init__.py at PR
      # time; this step catches mismatches between either of those and
      # the actual git tag at release time.
      - name: Validate wheel installs cleanly + version matches tag
        run: |
          python -m venv /tmp/wheel_test
          /tmp/wheel_test/bin/pip install --quiet dist/*.whl
          INSTALLED=$(/tmp/wheel_test/bin/python -c "import research_hub; print(research_hub.__version__)")
          /tmp/wheel_test/bin/python -c "from research_hub.cli import main"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "Installed version: $INSTALLED"
          echo "Git tag (without v): $TAG_VERSION"
          if [ "$INSTALLED" != "$TAG_VERSION" ]; then
            echo "::error::Version drift: research_hub.__version__='$INSTALLED' but git tag is '$GITHUB_REF_NAME' ($TAG_VERSION)."
            echo "::error::Update src/research_hub/__init__.py and pyproject.toml to match the tag, then re-tag."
            exit 1
          fi

      # v0.95.0 W10 (G5 #4): deepen the wheel smoke. The import + version
      # check above can't catch missing DATA files in the wheel (sample
      # vault, skills_data) — those only fail when a subcommand actually
      # uses them. Exercise the v0.89.1 hero path (init --sample) + the
      # agent-facing describe manifest against the INSTALLED wheel, in a
      # temp dir, with closed stdin (no prompts).
      - name: Smoke-test installed wheel (init --sample + describe)
        run: |
          SMOKE_VAULT=$(mktemp -d)/demo
          /tmp/wheel_test/bin/python -m research_hub init --sample --vault "$SMOKE_VAULT" </dev/null
          test -f "$SMOKE_VAULT/_HOME.md" || { echo "::error::init --sample did not produce _HOME.md — sample_vault data missing from wheel"; exit 1; }
          /tmp/wheel_test/bin/python -m research_hub describe --json | /tmp/wheel_test/bin/python -c "import sys,json; d=json.load(sys.stdin); assert d['version']=='${GITHUB_REF_NAME#v}', d['version']; assert d['skills'], 'skills_data missing from wheel'; assert d['mcp_tools'], 'mcp tools empty'; print('wheel smoke OK:', len(d['subcommands']), 'subcommands,', len(d['mcp_tools']), 'mcp tools,', len(d['skills']), 'skills')"

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        # v0.60.1: --skip-existing so a re-run (or a version already uploaded
        # manually via PyPI) doesn't 400 the whole CI job. CI still surfaces
        # other failures (auth, malformed dist, etc.) normally.
        run: twine upload --skip-existing dist/*
