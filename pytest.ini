[pytest]
testpaths = tests
addopts = --ignore=tests/stress -m "not slow and not stress" -p no:cacheprovider -p no:tmpdir -p no:langsmith -p no:logfire --timeout=30
markers =
    stress: stress/load tests excluded from default pytest run
    network: Tests that hit real external APIs (OpenAlex, arXiv, etc)
    evals: Evaluation tests measuring search accuracy and fit-check quality
    slow: Tests that take >30 seconds or block at C level (e.g. threading/subprocess timeouts)
