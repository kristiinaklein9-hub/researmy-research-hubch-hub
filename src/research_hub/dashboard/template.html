<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  {{ CSRF_META }}
  <title>research-hub dashboard</title>
  {{ AUTO_REFRESH_META }}
  <style>{{ STYLE }}</style>
</head>
<body>
  <header class="app-header" role="banner">
    <div class="header-bar">
      <div>
        <h2>research-hub dashboard</h2>
        <p class="header-meta">Vault: <code>{{ VAULT_ROOT }}</code></p>
      </div>
      <p class="header-meta">Generated {{ GENERATED_AT }} · {{ PERSONA_LABEL }}</p>
    </div>
  </header>
  <div class="app">
    <main role="main">
      {{ BODY }}
    </main>
    <footer>
      <p>Generated by <code>research-hub dashboard</code></p>
    </footer>
  </div>
  <dialog id="cmdk" class="cmdk" aria-label="Command palette">
    <div class="cmdk-box" role="dialog" aria-modal="true" aria-label="Command palette">
      <input id="cmdk-input" class="cmdk-input" type="text" autocomplete="off"
             spellcheck="false" placeholder="Type a command or subcommand…  (Esc to close)"
             aria-label="Filter commands" />
      <ul id="cmdk-list" class="cmdk-list" role="listbox" aria-label="Commands"></ul>
      <div class="cmdk-foot">
        <span><kbd>&uarr;</kbd><kbd>&darr;</kbd> navigate</span>
        <span><kbd>&crarr;</kbd> run / copy</span>
        <span><kbd>Esc</kbd> close</span>
        <span class="cmdk-mode" id="cmdk-mode"></span>
      </div>
    </div>
  </dialog>
  <script>
    const VAULT_DATA = {{ VAULT_DATA_JSON }};
    {{ SCRIPT }}
  </script>
</body>
</html>
